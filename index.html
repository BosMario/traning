  <script>
    // จับ error ทุกชนิดมาโชว์บนจอ (ช่วย debug บนมือถือที่เปิด console ไม่ได้)
    window.__err = function(msg){
      var el = document.getElementById('root');
      if(el) el.innerHTML = '<div style="padding:24px;font:14px -apple-system,sans-serif;color:#fff;background:#7f1d1d;min-height:100vh;white-space:pre-wrap;word-break:break-word">⚠️ เกิดข้อผิดพลาด:\n\n'+msg+'</div>';
    };
    window.addEventListener('error', function(e){
      window.__err((e.message||e.error||'unknown')+'\n'+(e.filename||'')+':'+(e.lineno||''));
    });
    window.addEventListener('unhandledrejection', function(e){ window.__err('Promise: '+(e.reason&&e.reason.message||e.reason)); });
    // watchdog: ถ้าหลังโหลดเสร็จ 6 วิ จอยังว่าง = library โหลดไม่สำเร็จ
    window.addEventListener('load', function(){
      setTimeout(function(){
        var r = document.getElementById('root');
        if(r && r.children.length===0){
          var miss = [];
          if(typeof React==='undefined') miss.push('React');
          if(typeof ReactDOM==='undefined') miss.push('ReactDOM');
          if(typeof Babel==='undefined') miss.push('Babel');
          if(typeof Chart==='undefined') miss.push('Chart.js');
          window.__err('แอปยังไม่ขึ้น\n\nLibrary ที่โหลดไม่สำเร็จ: '+(miss.length?miss.join(', '):'(โหลดครบ แต่ render ไม่ขึ้น)')+'\n\nเช็ก: ต่ออินเทอร์เน็ตอยู่ไหม / ลองเปิดผ่าน Live Server หรือ deploy แทนการดับเบิลคลิกไฟล์');
        }
      }, 6000);
    });
  </script>

  <script>
    // ลงทะเบียน Service Worker เพื่อให้เปิดได้แม้ไม่มีเน็ต (ทำงานเฉพาะตอนเสิร์ฟผ่าน http/https)
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      window.addEventListener('load', function(){
        navigator.serviceWorker.register('sw.js').catch(function(e){ console.warn('SW fail', e); });
      });

/* ============================================================
   2) PROGRAM GENERATION LOGIC
   ============================================================ */

function filterByEquip(ids, equip) {
  if (equip === 'gym') return ids;
  return ids.filter(id => {
    const e = exById(id); if (!e) return false;
    if (equip === 'bodyweight') return ['bodyweight','band'].includes(e.equip);
    if (equip === 'dumbbell_only') return ['dumbbell','bodyweight','band'].includes(e.equip);
    if (equip === 'dumbbell') return ['dumbbell','bodyweight','band','barbell'].includes(e.equip);
    return true;
  });
}

// เลือก split ตามจำนวนวัน
function pickSplit(days) {
  if (days <= 3) return { name: days === 2 ? 'Full Body A/B' : 'Full Body A/B/C', dayTypes: days === 2 ? ['fullA','fullB'] : ['fullA','fullB','fullC'] };
  if (days === 4) return { name: 'Upper / Lower', dayTypes: ['upper','lower','upper','lower'] };
  if (days === 5) return { name: 'Upper / Lower / Push / Pull / Legs', dayTypes: ['upper','lower','push','pull','legs'] };
  return { name: 'Push / Pull / Legs ×2', dayTypes: ['push','pull','legs','push','pull','legs'] };
}

const DAY_NAME = { push:'Push (ดัน)', pull:'Pull (ดึง)', legs:'Legs (ขา)', upper:'Upper (บน)', lower:'Lower (ล่าง)', fullA:'Full Body A', fullB:'Full Body B', fullC:'Full Body C' };

function buildProgram(profile) {
  const { goal, level, days, equip } = profile;
  const split = pickSplit(days);
  const scheme = REP_SCHEME[goal] || REP_SCHEME.fitness;
  // มือใหม่ลดเซ็ตลงนิด สูงเพิ่มขึ้น
  const setMod = level === 'beginner' ? -1 : level === 'advanced' ? 1 : 0;

  const target = level === 'advanced' ? 6 : level === 'beginner' ? 4 : 5; // จำนวนท่า/วัน
  const rank = id => exById(id).type === 'compound' ? 0 : 1;

  const workouts = split.dayTypes.map((type, i) => {
    let ids = filterByEquip(PRESETS[type], equip);
    if (ids.length === 0) ids = filterByEquip(PRESETS.fullA, equip); // fallback
    if (ids.length === 0) ids = PRESETS.fullA.filter(id => exById(id).equip === 'bodyweight');
    // เลือก compound ก่อน แล้วจำกัดจำนวนท่า (Array.sort เสถียร = คงลำดับ curated)
    ids = [...ids].sort((a,b)=>rank(a)-rank(b)).slice(0, target);
    const exercises = ids.map(id => {
      const e = exById(id);
      const sets = Math.max(2, scheme.sets + setMod);
      return {
        exerciseId: id,
        sets,
        reps: scheme.reps,
        rest: e.type === 'compound' ? scheme.restCompound : scheme.restIso,
      };
    });
    return { id: `w${i}`, name: DAY_NAME[type] || type, type, exercises };
  });

  return {
    id: 'prog-' + Date.now(),
    name: split.name,
    goal, level, days, equip,
    splitName: split.name,
    note: scheme.note,
    workouts,
    createdAt: Date.now(),
  };
}

// แนะนำตารางลงสัปดาห์ (กระจายวันพัก) — index วัน 0=อา..6=ส, ค่า = index ของ workout หรือ null
function buildSchedule(days) {
  // ลำดับวันที่นิยม: จ อ พ พฤ ศ ส อา
  const order = [1,2,3,4,5,6,0];
  const picks = {
    2: [1,4], 3: [1,3,5], 4: [1,2,4,5], 5: [1,2,3,5,6], 6: [1,2,3,4,5,6],
  }[days] || [1,3,5];
  const sched = Array(7).fill(null);
  picks.forEach((d, i) => { sched[d] = i; });
  return sched;
}

/* ============================================================
   3) HELPERS — 1RM, plate, date, storage
   ============================================================ */

const epley   = (w, r) => r <= 1 ? w : Math.round(w * (1 + r / 30));
const brzycki = (w, r) => r <= 1 ? w : Math.round(w * 36 / (37 - r));
const e1rm = (w, r) => Math.round((epley(w,r) + brzycki(w,r)) / 2);

// คำนวณแผ่นต่อข้าง — ใช้คู่แผ่นมาตรฐาน (kg หรือ lb)
function calcPlates(target, bar, unit) {
  const per = (target - bar) / 2;
  if (per <= 0) return { ok: per === 0, perSide: [], per: 0 };
  const sizes = unit === 'lb' ? [45, 35, 25, 10, 5, 2.5] : [25, 20, 15, 10, 5, 2.5, 1.25];
  let rem = per; const plates = [];
  for (const s of sizes) {
    while (rem >= s - 1e-9) { plates.push(s); rem = +(rem - s).toFixed(3); }
  }
  return { ok: Math.abs(rem) < 1e-6, perSide: plates, per, leftover: rem };
}

// ===== หน่วย kg/lb (เก็บข้อมูลเป็น kg เสมอ แปลงตอนแสดง/บันทึก) =====
const LB = 2.2046226218;
const uLabel = (unit) => unit === 'lb' ? 'lb' : 'kg';
const dispW = (kg, unit) => (kg === '' || kg == null) ? '' : (unit === 'lb' ? Math.round(kg * LB * 10) / 10 : kg);
const toKg  = (v, unit) => { const n = +v || 0; return unit === 'lb' ? +(n / LB).toFixed(2) : n; };

function sugText(sug, unit) {
  if (!sug) return '';
  const w = dispW(sug.weight, unit), u = uLabel(unit);
  if (sug.type === 'up')  return `เพิ่มเป็น ${w}${u} × ${sug.reps}`;
  if (sug.type === 'rep') return `${w}${u} ดันให้ถึง ${sug.reps} reps`;
  return `คุมฟอร์ม ${w}${u} × ${sug.reps} ให้ครบ`;
}

// แนะนำ warm-up set จากน้ำหนักจริง (kg) — คืนค่าเป็น kg
function warmupSets(workingKg, e) {
  if (!workingKg || workingKg <= 0) return [];
  const isBar = e && e.equip === 'barbell';
  const out = [];
  if (isBar && workingKg > 25) out.push({ label: 'บาร์', w: 20, reps: 10 });
  const pcts = workingKg >= 60 ? [[0.4,5],[0.6,3],[0.8,2]] : [[0.5,5],[0.7,3]];
  pcts.forEach(([p, reps]) => {
    const w = Math.round(workingKg * p / 2.5) * 2.5;
    if (w > 0 && (!isBar || w > 20)) out.push({ label: Math.round(p*100)+'%', w, reps });
  });
  return out;
}

// ประวัติท่านั้น (best set ต่อ session) ล่าสุด n ครั้ง — เรียงเก่า→ใหม่
function historyFor(sessions, exId, n = 8) {
  const out = [];
  for (const s of sessions) {
    const e = s.entries.find(e => e.exerciseId === exId);
    if (e && e.sets.length) {
      const best = e.sets.reduce((a,b)=> b.weight>a.weight?b:a, e.sets[0]);
      out.push({ date: s.date, weight: best.weight, reps: best.reps, e1rm: e1rm(best.weight, best.reps) });
      if (out.length >= n) break;
    }
  }
  return out.reverse();
}

const initialState = {
  profile: null,          // { name, sex, age, height, weight, goal, level, days, equip }
  program: null,          // โปรแกรมปัจจุบัน
  schedule: null,         // array length 7
  sessions: [],           // ประวัติเทรน [{id, date, workoutId, name, entries:[{exerciseId, sets:[{weight,reps,rpe,done}]}], note, duration}]
  bodyLog: [],            // [{date, weight}] บันทึกน้ำหนักตัว
  measurements: [],       // [{date, chest, waist, arm, hip, thigh}] สัดส่วนร่างกาย
  deloadAck: null,        // timestamp ล่าสุดที่ปัด deload reminder
  settings: { dark: true, unit: 'kg', sound: true },
};

// รวม state ที่โหลดมากับ default (กัน field ใหม่หาย เวลาอัปเดตเวอร์ชัน)
function mergeState(loaded) {
  if (!loaded) return initialState;
  return {
    ...initialState,
    ...loaded,
    settings: { ...initialState.settings, ...(loaded.settings || {}) },
    bodyLog: loaded.bodyLog || [],
    measurements: loaded.measurements || [],
    sessions: loaded.sessions || [],
  };
}

function reducer(state, action) {
  switch (action.type) {
    case 'INIT': return action.payload;
    case 'SET_PROFILE': return { ...state, profile: action.payload };
    case 'SET_PROGRAM': return { ...state, program: action.payload, schedule: action.schedule ?? state.schedule };
    case 'UPDATE_PROGRAM': return { ...state, program: action.payload, schedule: action.schedule ?? state.schedule };
    case 'SET_SCHEDULE': return { ...state, schedule: action.payload };
    case 'ADD_SESSION': return { ...state, sessions: [action.payload, ...state.sessions] };
    case 'UPDATE_SESSION': return { ...state, sessions: state.sessions.map(s => s.id === action.payload.id ? action.payload : s) };
    case 'DELETE_SESSION': return { ...state, sessions: state.sessions.filter(s => s.id !== action.id) };
    case 'ADD_MEASUREMENT': {
      const k = dayKey(action.payload.date);
      const rest = state.measurements.filter(m => dayKey(m.date) !== k);
      return { ...state, measurements: [...rest, action.payload].sort((a,b)=>a.date-b.date) };
    }
    case 'DELETE_MEASUREMENT': return { ...state, measurements: state.measurements.filter(m => m.date !== action.date) };
    case 'ADD_BODYWEIGHT': {
      const k = dayKey(action.payload.date);
      const rest = state.bodyLog.filter(b => dayKey(b.date) !== k); // 1 ค่า/วัน
      return { ...state, bodyLog: [...rest, action.payload].sort((a,b)=>a.date-b.date) };
    }
    case 'DELETE_BODYWEIGHT': return { ...state, bodyLog: state.bodyLog.filter(b => b.date !== action.date) };
    case 'SET_DELOAD_ACK': return { ...state, deloadAck: action.payload };
    case 'SET_SETTINGS': return { ...state, settings: { ...state.settings, ...action.payload } };
    case 'REPLACE_ALL': return mergeState(action.payload);
    case 'RESET': return initialState;
    default: return state;
  }
}

const Sparkline = ({ data, color = '#3b82f6', h = 34, w = 130 }) => {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data), span = (max - min) || 1;
  const x = i => (i / (data.length - 1)) * w;
  const y = v => h - ((v - min) / span) * (h - 6) - 3;
  const pts = data.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="overflow-visible">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={x(data.length-1)} cy={y(data[data.length-1])} r="3" fill={color}/>
    </svg>
  );
};

function Dashboard({ go }) {
  const { state, dispatch } = useApp();
  const { profile, program, schedule, sessions } = state;
  const deload = useMemo(()=>deloadInfo(sessions, state.deloadAck), [sessions, state.deloadAck]);
  const todayDow = new Date().getDay();
  const todayWorkoutIdx = schedule ? schedule[todayDow] : null;
  const todayWorkout = (program && todayWorkoutIdx != null) ? program.workouts[todayWorkoutIdx] : null;

  // streak: นับสัปดาห์ที่เทรนต่อเนื่อง (อย่างง่าย: จำนวนวันที่เทรน 7 วันล่าสุด & ทั้งหมด)
  const stats = useMemo(() => {
    const last7 = sessions.filter(s => Date.now() - s.date < 7*864e5).length;
    const totalVol = sessions.reduce((a,s)=>a + sessionVolume(s), 0);
    // streak วันต่อเนื่อง
    const daysSet = new Set(sessions.map(s => dayKey(s.date)));
    let streak = 0; let d = new Date();
    // ถ้าวันนี้ยังไม่เทรนให้เริ่มนับจากเมื่อวาน
    if (!daysSet.has(dayKey(d.getTime()))) d.setDate(d.getDate()-1);
    while (daysSet.has(dayKey(d.getTime()))) { streak++; d.setDate(d.getDate()-1); }
    return { last7, totalVol, streak, total: sessions.length };
  }, [sessions]);

  return (
    <Screen>
      <div className="pt-2">
        <p className="text-neutral-500">{DAYS_FULL[todayDow]} · {fmtDate(Date.now())}</p>
        <h1 className="text-3xl font-extrabold">สวัสดี{profile?.name?` ${profile.name}`:''} 👋</h1>
      </div>

      {/* การ์ดวันนี้ */}
      <Card className="p-5 mt-4 bg-gradient-to-br from-blue-500 via-blue-600 to-indigo-600 border-0 text-white shadow-xl shadow-blue-600/25">
        <p className="text-blue-100 text-sm font-medium">โปรแกรมวันนี้</p>
        {todayWorkout ? (
          <>
            <h2 className="text-2xl font-bold mt-1">{todayWorkout.name}</h2>
            <p className="text-blue-100 text-sm mt-1">{todayWorkout.exercises.length} ท่า · ~{Math.round(todayWorkout.exercises.length*8)} นาที</p>
            <button onClick={()=>go('log', { workoutIdx: todayWorkoutIdx })} className="mt-4 bg-white text-blue-700 font-bold rounded-xl min-h-[48px] w-full flex items-center justify-center gap-2 active:scale-95 transition">
              <Icon d={I.play} className="w-5 h-5"/> เริ่มเทรน
            </button>
            <button onClick={()=>go('log',{workoutIdx:'free'})} className="mt-2 text-blue-50/90 text-sm font-medium w-full">หรือ เทรนอิสระ →</button>
          </>
        ) : (
          <>
            <h2 className="text-2xl font-bold mt-1">วันพัก 🛌</h2>
            <p className="text-blue-100 text-sm mt-1">พักฟื้นกล้ามเนื้อ หรือเทรนอิสระก็ได้</p>
            <div className="flex gap-2 mt-4">
              <button onClick={()=>go('log',{workoutIdx:'free'})} className="flex-1 bg-white text-blue-700 font-bold rounded-xl min-h-[44px] active:scale-95 transition flex items-center justify-center gap-1.5"><Icon d={I.play} className="w-4 h-4"/> เทรนอิสระ</button>
              <button onClick={()=>go('schedule')} className="px-4 bg-white/20 text-white font-bold rounded-xl min-h-[44px] active:scale-95 transition">ตาราง</button>
            </div>
          </>
        )}
      </Card>

      {/* Deload banner */}
      {deload && (
        <div className="mt-4 p-4 rounded-2xl bg-gradient-to-br from-amber-500 to-orange-500 text-white relative overflow-hidden shadow-lg shadow-orange-500/20">
          <button onClick={()=>dispatch({type:'SET_DELOAD_ACK', payload:Date.now()})} className="absolute top-2.5 right-2.5 w-7 h-7 grid place-items-center rounded-full bg-white/20"><Icon d={I.x} className="w-4 h-4"/></button>
          <p className="font-bold flex items-center gap-2">🪫 ถึงเวลา Deload แล้ว</p>
          <p className="text-sm text-amber-50 mt-1 pr-6">เทรนต่อเนื่องมา {deload.weeks} สัปดาห์ — สัปดาห์นี้ลองลด volume ลง ~40–50% (ลดเซ็ตหรือน้ำหนัก) เพื่อให้ร่างกายฟื้นแล้วกลับมาแรงขึ้น</p>
        </div>
      )}

      {/* Backup reminder */}
      {sessions.length>=3 && (!state.settings.lastBackup || Date.now()-state.settings.lastBackup > 14*864e5) && (
        <div className="mt-4 p-4 rounded-2xl bg-neutral-100 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 flex items-center gap-3">
          <span className="text-2xl">💾</span>
          <div className="flex-1">
            <p className="font-semibold text-sm">ควรสำรองข้อมูล</p>
            <p className="text-xs text-neutral-500">{state.settings.lastBackup?`สำรองล่าสุด ${fmtDate(state.settings.lastBackup)}`:'ยังไม่เคยสำรอง'} — iOS อาจล้างข้อมูลได้</p>
          </div>
          <Btn variant="ghost" onClick={()=>{ exportData(state); dispatch({type:'SET_SETTINGS', payload:{lastBackup:Date.now()}}); }} className="px-4">Export</Btn>
        </div>
      )}

      {/* สถิติ */}
      <div className="grid grid-cols-3 gap-3 mt-4">
        <StatCard icon={I.fire} color="text-orange-500" bg="bg-orange-100 dark:bg-orange-500/15" label="สตรีค (วัน)" value={stats.streak}/>
        <StatCard icon={I.cal} color="text-blue-500" bg="bg-blue-100 dark:bg-blue-500/15" label="7 วันนี้" value={stats.last7}/>
        <StatCard icon={I.trophy} color="text-amber-500" bg="bg-amber-100 dark:bg-amber-500/15" label="ทั้งหมด" value={stats.total}/>
      </div>

      {/* โปรแกรม */}
      {program && (
        <Card className="p-4 mt-4">
          <div className="flex items-center justify-between">
            <div>
              <p className="text-xs text-neutral-500">โปรแกรมปัจจุบัน</p>
              <p className="font-bold">{program.name}</p>
            </div>
            <Pill onClick={()=>go('schedule')}>จัดการ</Pill>
          </div>
          <div className="flex gap-1.5 mt-3">
            {schedule && schedule.map((w,i)=>(
              <div key={i} className={`flex-1 text-center py-2 rounded-lg text-xs ${i===todayDow?'ring-2 ring-blue-500':''} ${w!=null?'bg-blue-100 dark:bg-blue-500/20 text-blue-700 dark:text-blue-300 font-semibold':'bg-neutral-100 dark:bg-neutral-800 text-neutral-400'}`}>
                {DAYS_TH[i]}
              </div>
            ))}
          </div>
        </Card>
      )}

      {/* ล่าสุด */}
      {sessions.length>0 && (
        <div className="mt-4">
          <div className="flex items-center justify-between mb-2">
            <h3 className="font-bold">ประวัติล่าสุด</h3>
            <button onClick={()=>go('progress')} className="text-blue-600 text-sm font-medium">ดูทั้งหมด</button>
          </div>
          <div className="space-y-2">
            {sessions.slice(0,3).map(s=>(
              <Card key={s.id} className="p-3 flex items-center justify-between">
                <div>
                  <p className="font-semibold">{s.name}</p>
                  <p className="text-xs text-neutral-500">{fmtDate(s.date)} · {s.entries.reduce((a,e)=>a+e.sets.filter(x=>x.done).length,0)} เซ็ต · {dispW(Math.round(sessionVolume(s)),state.settings.unit||'kg').toLocaleString()} {uLabel(state.settings.unit||'kg')}</p>
                </div>
                <span className="text-2xl">💪</span>
              </Card>
            ))}
          </div>
        </div>
      )}
    </Screen>
  );
}

const StatCard = ({ icon, color, bg, label, value }) => (
  <Card className="p-3 text-center">
    <div className={`w-9 h-9 mx-auto rounded-xl grid place-items-center ${bg||'bg-neutral-100 dark:bg-neutral-800'}`}><Icon d={icon} className={`w-5 h-5 ${color}`}/></div>
    <div className="text-2xl font-extrabold mt-1.5 tabular-nums">{value}</div>
    <div className="text-[11px] text-neutral-500">{label}</div>
  </Card>
);

function sessionVolume(s) {
  return s.entries.reduce((a,e)=> a + e.sets.reduce((b,x)=> b + (x.done ? (+x.weight||0)*(+x.reps||0) : 0), 0), 0);
}

function SchedulePage({ go }) {
  const { state, dispatch } = useApp();
  const { program, schedule } = state;
  const [editDay, setEditDay] = useState(null);

  if (!program) return <Screen><Empty title="ยังไม่มีโปรแกรม" sub="ไปที่ตั้งค่าเพื่อสร้างโปรแกรมใหม่"/></Screen>;

  const assign = (workoutIdx) => {
    const next = [...schedule]; next[editDay] = workoutIdx; dispatch({ type:'SET_SCHEDULE', payload: next }); setEditDay(null);
  };

    <Screen>

              </div>

function beep(times = 1) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    let t = ctx.currentTime;
    for (let i=0;i<times;i++){
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880; o.type = 'sine';
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.4, t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.25);
      o.start(t); o.stop(t+0.26); t += 0.32;
    }
  } catch {}
}

function RestTimer({ seconds, onClose, sound }) {
  const [left, setLeft] = useState(seconds);
  const [running, setRunning] = useState(true);
  useEffect(() => {
    if (!running) return;
    if (left <= 0) { if (sound) beep(2); onClose(); return; }
    const t = setTimeout(()=>setLeft(l=>l-1), 1000);
    return ()=>clearTimeout(t);
  }, [left, running]);
  const pct = (left / seconds) * 100;
  return (
    <div className="fixed inset-x-0 bottom-0 z-40 px-4 pb-safe">
      <div className="bg-neutral-900 dark:bg-neutral-800 text-white rounded-2xl p-4 shadow-2xl mb-24 fade-in">

        </div>
        <div className="flex items-center gap-4 mt-1">
          <span className="text-4xl font-extrabold tabular-nums">{fmtClock(left)}</span>
          <div className="flex-1 flex gap-2">
            <button onClick={()=>setLeft(l=>l+15)} className="flex-1 bg-white/10 rounded-lg py-2 text-sm font-medium">+15</button>
            <button onClick={()=>setRunning(r=>!r)} className="w-11 grid place-items-center bg-white/10 rounded-lg"><Icon d={running?I.pause:I.play} className="w-5 h-5"/></button>
            <button onClick={onClose} className="flex-1 bg-blue-600 rounded-lg py-2 text-sm font-medium">ข้าม</button>
          </div>
        </div>
        <div className="h-1.5 bg-white/10 rounded-full mt-3 overflow-hidden">
          <div className="h-full bg-blue-500 transition-all" style={{width:`${pct}%`}}/>
        </div>
      </div>
    </div>
  );
}

function WorkoutLog({ workoutIdx, go }) {
  const { state, dispatch } = useApp();
  const { program, sessions, settings } = state;
  const unit = settings.unit || 'kg';
  const isFree = workoutIdx === 'free';
  const workout = isFree ? { id:'free', name:'เทรนอิสระ', exercises:[] }
                         : (program && workoutIdx!=null ? program.workouts[workoutIdx] : null);

  const startRef = useRef(Date.now());
  const [rest, setRest] = useState(null);
  const [note, setNote] = useState('');
  const [newPRs, setNewPRs] = useState(null);
  const [picker, setPicker] = useState(null);   // {mode:'add'} | {mode:'swap', ei}
  const [open, setOpen] = useState({});          // panel ขยาย warm-up/ประวัติ
  const wakeRef = useRef(null);

  const mkEntry = (exId, nSets) => {
    const prev = lastEntryFor(sessions, exId);
    const e = exById(exId);
    const reps = e?.type==='compound' ? '6–12' : '8–12';
    const sug = suggestNext(prev, reps);
    const pf = dispW(sug?.weight ?? prev?.weight, unit) || '';
    return {
      exerciseId: exId, rest: e?.type==='compound'?120:75, targetReps: reps,
      sets: Array.from({length: nSets||3}, () => ({ weight: pf, reps:'', rpe:'', done:false })),
      prev, sug,
    };
  };

  const [entries, setEntries] = useState(() => {
    if (!workout) return [];
    return workout.exercises.map(we => {
      const prev = lastEntryFor(sessions, we.exerciseId);
      const sug = suggestNext(prev, we.reps);
      const pf = dispW(sug?.weight ?? prev?.weight, unit) || '';
      return {
        exerciseId: we.exerciseId, rest: we.rest, targetReps: we.reps,
        sets: Array.from({length: we.sets}, () => ({ weight: pf, reps:'', rpe:'', done:false })),
        prev, sug,
      };
    });
  });

  useEffect(() => {
    let lock;
    (async()=>{ try { if ('wakeLock' in navigator) { lock = await navigator.wakeLock.request('screen'); wakeRef.current = lock; } } catch {} })();
    return () => { try { lock && lock.release(); } catch {} };
  }, []);

  if (!workout) return <Screen><Empty title="ไม่พบโปรแกรม" sub="กลับไปหน้าหลัก"/><Btn onClick={()=>go('dashboard')} className="w-full mt-4">กลับหน้าหลัก</Btn></Screen>;

  const update = (ei, si, k, v) => setEntries(es => es.map((e,i)=> i!==ei ? e : { ...e, sets: e.sets.map((s,j)=> j!==si ? s : { ...s, [k]: v }) }));
  const toggleDone = (ei, si) => {

function LiveDuration({ start }) {
  const [, force] = useReducer(x=>x+1,0);
  useEffect(()=>{ const t=setInterval(force,1000); return ()=>clearInterval(t); },[]);
  return <span>{fmtClock(Math.round((Date.now()-start)/1000))}</span>;
}

function lastEntryFor(sessions, exId) {
  for (const s of sessions) {
    const e = s.entries.find(e=>e.exerciseId===exId);
    if (e && e.sets.length) {
      // เซ็ตที่หนักสุด
      const best = e.sets.reduce((a,b)=> (b.weight>a.weight?b:a), e.sets[0]);
      return { weight: best.weight, reps: best.reps, rpe: best.rpe, date: s.date };
    }
  }
  return null;
}

const topRep = (r) => { const m = String(r).match(/(\d+)\s*$/); return m ? +m[1] : 12; };
const botRep = (r) => { const m = String(r).match(/^\s*(\d+)/); return m ? +m[1] : 8; };

// แนะนำ progressive overload ครั้งถัดไป จากผลครั้งก่อน + ช่วง rep
function suggestNext(prev, targetReps) {
  if (!prev || !prev.weight) return null;
  const top = topRep(targetReps), bot = botRep(targetReps);
  const inc = prev.weight >= 40 ? 2.5 : prev.weight >= 20 ? 2 : 1;
  if (prev.reps >= top && (!prev.rpe || prev.rpe <= 9)) {
    const nw = +(prev.weight + inc).toFixed(2);
    return { weight: nw, reps: bot, type:'up', msg:`เพิ่มเป็น ${nw}kg × ${bot}` };
  }
  if (prev.reps < top) {
    const nr = Math.min(prev.reps + 1, top);
    return { weight: prev.weight, reps: nr, type:'rep', msg:`${prev.weight}kg ดันให้ถึง ${nr} reps` };
  }
  return { weight: prev.weight, reps: prev.reps, type:'hold', msg:`คุมฟอร์ม ${prev.weight}kg × ${prev.reps} ให้ครบ` };
}

// ตรวจ PR ใหม่: เทียบ best e1rm ของ session กับประวัติทั้งหมด
function computeNewPRs(session, pastSessions) {
  const hist = {};
  pastSessions.forEach(s=>s.entries.forEach(e=>e.sets.forEach(st=>{
    const v = e1rm(st.weight, st.reps); if (!hist[e.exerciseId] || v>hist[e.exerciseId]) hist[e.exerciseId]=v;
  })));
  const prs = [];
  session.entries.forEach(e=>{
    let best=0, bw=0, br=0;
    e.sets.forEach(st=>{ const v=e1rm(st.weight,st.reps); if(v>best){ best=v; bw=st.weight; br=st.reps; } });
    if (best>0 && best > (hist[e.exerciseId]||0)) prs.push({ exerciseId:e.exerciseId, e1rm:best, weight:bw, reps:br });
  });
  return prs;
}

// แนะนำ deload: เทรนต่อเนื่อง >=N สัปดาห์ (แต่ละสัปดาห์ >=2 ครั้ง) และยังไม่ได้ปัดเตือน
function deloadInfo(sessions, ackTs) {
  if (sessions.length < 8) return null;
  const weekOf = (ts)=>{ const d=new Date(ts); const oj=new Date(d.getFullYear(),0,1); return d.getFullYear()*100 + Math.ceil((((d-oj)/864e5)+oj.getDay()+1)/7); };
  const counts = {};
  sessions.forEach(s=>{ const k=weekOf(s.date); counts[k]=(counts[k]||0)+1; });
  // นับสัปดาห์ต่อเนื่องล่าสุดที่ >=2 ครั้ง (ไล่จากสัปดาห์ปัจจุบันถอยหลัง)
  const nowWk = weekOf(Date.now());
  let streak=0;
  for (let w=nowWk; ; w--) {
    // จัดการข้ามปี: ถ้าไม่มี key ของสัปดาห์นี้ ให้หยุด
    if ((counts[w]||0) >= 2) streak++;
    else if (w===nowWk) continue; // สัปดาห์นี้ยังไม่ครบ ข้ามได้
    else break;
    if (streak>20) break;
  }
  if (streak < 5) return null;
  if (ackTs && Date.now()-ackTs < 7*864e5) return null; // ปัดแล้วภายใน 7 วัน
  return { weeks: streak };
}

// volume (จำนวนเซ็ต) ต่อกลุ่มกล้ามใน N วันล่าสุด (secondary นับครึ่ง)
function muscleVolume(sessions, days = 7) {
  const since = Date.now() - days*864e5;
  const vol = {};
  sessions.filter(s=>s.date>=since).forEach(s=>s.entries.forEach(e=>{
    const ex = exById(e.exerciseId); if (!ex) return;
    const n = e.sets.length;
    vol[ex.primary] = (vol[ex.primary]||0) + n;
    (ex.secondary||[]).forEach(m=>{ vol[m] = (vol[m]||0) + n*0.5; });
  }));
  return vol;
}

function CalendarHeatmap({ sessions }) {
  const byDay = {};
  sessions.forEach(s=>{ const k = dayKey(s.date); byDay[k] = (byDay[k]||0) + s.entries.reduce((a,e)=>a+e.sets.length,0); });
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(today); start.setDate(start.getDate() - today.getDay() - 7*15); // 16 สัปดาห์ เริ่มวันอาทิตย์
  const cells = [];
  for (let d = new Date(start); d <= today; d.setDate(d.getDate()+1)) {
    const k = dayKey(d.getTime());
    cells.push({ k, c: byDay[k]||0 });
  }
  const cls = c => c===0 ? 'bg-neutral-200/70 dark:bg-neutral-800'
    : c<=5 ? 'bg-emerald-300 dark:bg-emerald-500/40'

    : 'bg-emerald-600 dark:bg-emerald-400';
  return (
    <Card className="p-4 mt-4">
      <p className="font-bold mb-3">ความสม่ำเสมอ (16 สัปดาห์)</p>
      <div className="grid grid-rows-7 grid-flow-col gap-1 overflow-x-auto no-scrollbar pb-1" style={{gridAutoColumns:'14px'}}>
        {cells.map((c,i)=>(<div key={i} className={`w-3.5 h-3.5 rounded-[4px] ${cls(c.c)}`} title={`${c.k}: ${c.c} เซ็ต`}/>))}
      </div>
      <div className="flex items-center justify-end gap-1.5 mt-2 text-[10px] text-neutral-400">
        <span>น้อย</span>
        <span className="w-3 h-3 rounded-[3px] bg-neutral-200/70 dark:bg-neutral-800"/>

        <span className="w-3 h-3 rounded-[3px] bg-emerald-500 dark:bg-emerald-500/70"/>
        <span className="w-3 h-3 rounded-[3px] bg-emerald-600 dark:bg-emerald-400"/>
        <span>มาก</span>
      </div>
    </Card>
  );
}

function computeAchievements(state) {
  const { sessions, bodyLog, measurements } = state;
  const totalVol = sessions.reduce((a,s)=>a+sessionVolume(s),0);
  const daysSet = new Set(sessions.map(s=>dayKey(s.date)));
  let streak=0, d=new Date(); if(!daysSet.has(dayKey(d.getTime()))) d.setDate(d.getDate()-1);
  while(daysSet.has(dayKey(d.getTime()))){ streak++; d.setDate(d.getDate()-1); }
  return [
    { emoji:'🌱', name:'ก้าวแรก', desc:'เทรนครั้งแรก', got: sessions.length>=1 },
    { emoji:'🔟', name:'10 ครั้ง', desc:'เทรนครบ 10 ครั้ง', got: sessions.length>=10 },
    { emoji:'🏅', name:'50 ครั้ง', desc:'เทรนครบ 50 ครั้ง', got: sessions.length>=50 },
    { emoji:'🏆', name:'100 ครั้ง', desc:'เทรนครบ 100 ครั้ง', got: sessions.length>=100 },
    { emoji:'🔥', name:'สตรีค 7', desc:'เทรนต่อเนื่อง 7 วัน', got: streak>=7 },
    { emoji:'💪', name:'100 ตัน', desc:'ยกสะสม 100,000kg', got: totalVol>=100000 },
    { emoji:'🦾', name:'ล้าน!', desc:'ยกสะสม 1,000,000kg', got: totalVol>=1000000 },
    { emoji:'⚖️', name:'ใส่ใจรูปร่าง', desc:'บันทึกน้ำหนัก/สัดส่วน', got: bodyLog.length>=1||measurements.length>=1 },
  ];
}

function AchievementsCard() {
  const { state } = useApp();

function SessionEditor({ session, onClose }) {

  const upd = (ei,si,k,v)=>setEntries(a=>a.map((e,i)=>i!==ei?e:{...e,sets:e.sets.map((s,j)=>j!==si?s:{...s,[k]:v})}));

function Progress({ go }) {
  const { state, dispatch } = useApp();
  const { sessions } = state;
  const unit = state.settings.unit || 'kg';
  const [editSession, setEditSession] = useState(null);
  const [histQ, setHistQ] = useState('');
  const [exId, setExId] = useState('');
  const chartRef = useRef(null); const chartInst = useRef(null);
  const bodyRef = useRef(null); const bodyInst = useRef(null);

  // ท่าที่เคยเล่น
  const trainedExs = useMemo(() => {
    const ids = new Set(); sessions.forEach(s=>s.entries.forEach(e=>ids.add(e.exerciseId)));
    return [...ids];
  }, [sessions]);

  useEffect(()=>{ if (!exId && trainedExs.length) setExId(trainedExs[0]); }, [trainedExs]);

  // PRs
  const prs = useMemo(()=>{
    const map = {};
    sessions.forEach(s=>s.entries.forEach(e=>e.sets.forEach(st=>{
      const est = e1rm(st.weight, st.reps);
      if (!map[e.exerciseId] || est > map[e.exerciseId].e1rm) map[e.exerciseId] = { e1rm: est, weight: st.weight, reps: st.reps, date: s.date };
    })));
    return Object.entries(map).map(([id,v])=>({ id, ...v })).sort((a,b)=>b.e1rm-a.e1rm);
  }, [sessions]);

  // volume รายสัปดาห์
  const weeklyVol = useMemo(()=>{
    const map = {};
    sessions.forEach(s=>{ const d=new Date(s.date); const onejan=new Date(d.getFullYear(),0,1); const wk=Math.ceil((((d-onejan)/864e5)+onejan.getDay()+1)/7); const key=`${d.getFullYear()}-W${wk}`; map[key]=(map[key]||0)+sessionVolume(s); });
    return Object.entries(map).slice(-8);
  }, [sessions]);

  // chart e1rm ของท่าที่เลือก
  useEffect(()=>{
    if (!chartRef.current || !exId) return;
    const points = [];
    [...sessions].reverse().forEach(s=>{
      const e = s.entries.find(e=>e.exerciseId===exId); if(!e) return;
      const best = Math.max(...e.sets.map(st=>e1rm(st.weight,st.reps)));
      points.push({ x: fmtDate(s.date), y: best });
    });
    if (chartInst.current) chartInst.current.destroy();
    const dark = document.documentElement.classList.contains('dark');
    chartInst.current = new Chart(chartRef.current, {
      type:'line',
      data:{ labels: points.map(p=>p.x), datasets:[{ label:'est. 1RM (kg)', data: points.map(p=>p.y), borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.15)', fill:true, tension:.3, pointRadius:4, pointBackgroundColor:'#3b82f6' }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ ticks:{color: dark?'#888':'#666', maxRotation:0, autoSkip:true, maxTicksLimit:5}, grid:{display:false} }, y:{ ticks:{color: dark?'#888':'#666'}, grid:{color: dark?'#262626':'#eee'} } } }
    });
    return ()=>{ if(chartInst.current) chartInst.current.destroy(); };
  }, [exId, sessions]);

  // body weight chart
  useEffect(()=>{
    if (!bodyRef.current || !weeklyVol.length) return;
    if (bodyInst.current) bodyInst.current.destroy();
    const dark = document.documentElement.classList.contains('dark');
    bodyInst.current = new Chart(bodyRef.current, {
      type:'bar',
      data:{ labels: weeklyVol.map(([k])=>k.split('-W')[1]?'W'+k.split('-W')[1]:k), datasets:[{ label:'Volume', data: weeklyVol.map(([,v])=>Math.round(v)), backgroundColor:'#6366f1', borderRadius:6 }] },
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ ticks:{color:dark?'#888':'#666'}, grid:{display:false} }, y:{ ticks:{color:dark?'#888':'#666'}, grid:{color:dark?'#262626':'#eee'} } } }
    });
    return ()=>{ if(bodyInst.current) bodyInst.current.destroy(); };
  }, [weeklyVol]);

  return (
    <Screen>
      <h1 className="text-3xl font-extrabold pt-2">ความก้าวหน้า</h1>

      <BodyWeightCard/>
      <MeasurementsCard/>
      <AchievementsCard/>

      {sessions.length===0 && <Empty title="ยังไม่มีข้อมูลเทรน" sub="เริ่มเทรนครั้งแรกแล้วกลับมาดูกราฟพัฒนาการ"/>}

      {sessions.length>0 && <>
      <MuscleBalanceCard/>
      <CalendarHeatmap sessions={sessions}/>

      <Card className="p-4 mt-4">
        <p className="font-bold mb-1">Volume รายสัปดาห์ (kg)</p>
        <div className="h-44"><canvas ref={bodyRef}/></div>
      </Card>

      <Card className="p-4 mt-4">
        <div className="flex items-center justify-between mb-2">
          <p className="font-bold">กราฟ est. 1RM</p>
        </div>
        <select value={exId} onChange={e=>setExId(e.target.value)} className="input mb-3">
          {trainedExs.map(id=><option key={id} value={id}>{exById(id)?.th||id}</option>)}
        </select>
        <div className="h-44"><canvas ref={chartRef}/></div>
      </Card>

      <h3 className="font-bold mt-6 mb-2 flex items-center gap-2"><Icon d={I.trophy} className="w-5 h-5 text-amber-500"/> Personal Records</h3>
      <div className="space-y-2">
        {prs.slice(0,10).map(pr=>(
          <Card key={pr.id} className="p-3 flex items-center justify-between">
            <div>
              <p className="font-semibold">{exById(pr.id)?.th||pr.id}</p>
              <p className="text-xs text-neutral-500">{dispW(pr.weight,unit)}{uLabel(unit)} × {pr.reps} · {fmtDate(pr.date)}</p>
            </div>
            <div className="text-right">
              <p className="text-xl font-extrabold text-blue-600">{dispW(pr.e1rm,unit)}</p>
              <p className="text-[10px] text-neutral-400">{uLabel(unit)} 1RM</p>
            </div>
          </Card>
        ))}
      </div>

      <h3 className="font-bold mt-6 mb-2">ประวัติการเทรน</h3>
      <input value={histQ} onChange={e=>setHistQ(e.target.value)} placeholder="🔍 ค้นหาชื่อ / วันที่" className="input mb-2"/>
      <div className="space-y-2">
        {sessions.filter(s=> !histQ || s.name.includes(histQ) || fmtDate(s.date).includes(histQ)).map(s=>(
          <Card key={s.id} className="p-3">
            <div className="flex items-center justify-between gap-2">
              <div className="min-w-0">
                <p className="font-semibold truncate">{s.name}</p>
                <p className="text-xs text-neutral-500">{fmtDate(s.date)} · {fmtClock(s.duration||0)} · {dispW(Math.round(sessionVolume(s)),unit).toLocaleString()} {uLabel(unit)}</p>
              </div>
              <div className="flex gap-1 shrink-0">
                <IconBtn icon={I.edit} onClick={()=>setEditSession(s)}/>
                <IconBtn icon={I.trash} danger onClick={()=>{ if(confirm('ลบประวัตินี้?')) dispatch({type:'DELETE_SESSION', id:s.id}); }}/>
              </div>
            </div>
            {s.note && <p className="text-xs text-neutral-500 mt-1 italic">"{s.note}"</p>}
          </Card>
        ))}
      </div>
      </>}
      {editSession && <SessionEditor session={editSession} onClose={()=>setEditSession(null)}/>}
    </Screen>
  );
}

function PlateCalc() {
  const { state } = useApp(); const unit = state.settings.unit || 'kg';
  const barDefault = unit==='lb'?45:20;
  const [target, setTarget] = useState(unit==='lb'?135:60); const [bar, setBar] = useState(barDefault);
  const res = calcPlates(+target||0, +bar||0, unit);
  const colors = { 45:'bg-red-500',35:'bg-blue-500',25:'bg-red-500',20:'bg-blue-500',15:'bg-yellow-500',10:'bg-green-600',5:'bg-neutral-300 text-neutral-800',2.5:'bg-neutral-500',1.25:'bg-neutral-400' };
  return (
    <div>
      <div className="grid grid-cols-2 gap-3">
        <Field label={`น้ำหนักรวม (${uLabel(unit)})`}><input type="number" inputMode="decimal" value={target} onChange={e=>setTarget(e.target.value)} className="input"/></Field>

      <Card className="p-4 mt-4">

        <div className="flex items-center justify-between p-4">
          <span className="font-medium">⚖️ หน่วยน้ำหนัก</span>

            {['kg','lb'].map(u=>(
              <button key={u} onClick={()=>dispatch({type:'SET_SETTINGS', payload:{unit:u}})} className={`px-4 py-1.5 rounded-full text-sm font-semibold transition ${(settings.unit||'kg')===u?'bg-blue-600 text-white':'text-neutral-500'}`}>{u}</button>
            ))}
          </div>
        </div>
      </Card>

      <SectionTitle>ข้อมูล (สำคัญ — สำรองไว้!)</SectionTitle>
      <Card className="divide-y divide-neutral-100 dark:divide-neutral-800">
        <RowBtn label={`⬇️ Export ข้อมูลเป็น JSON${settings.lastBackup?`  ·  ล่าสุด ${fmtDate(settings.lastBackup)}`:''}`} onClick={exportJSON} icon={I.dl}/>
        <label className="flex items-center justify-between p-4 active:bg-neutral-50 dark:active:bg-neutral-800/50 cursor-pointer">
          <span className="font-medium">⬆️ Import ข้อมูลจากไฟล์</span>

      </Card>

      <p className="text-center text-xs text-neutral-400 mt-6">FitLog · เก็บข้อมูลในเครื่องนี้เท่านั้น<br/>อย่าลืม Export สำรองเป็นระยะ 💾</p>

      <Sheet open={tool==='1rm'} onClose={()=>setTool(null)} title="1RM Calculator"><OneRMCalc/></Sheet>
      <Sheet open={tool==='plate'} onClose={()=>setTool(null)} title="Plate Calculator"><PlateCalc/></Sheet>
    </Screen>
  );
}

  <button onClick={onClick} className="w-full flex items-center justify-between p-4 active:bg-neutral-50 dark:active:bg-neutral-800/50">

function TabBar({ tab, setTab }) {
  const tabs = [
    ['dashboard','หน้าหลัก',I.home],
    ['schedule','ตาราง',I.cal],
    ['library','คลังท่า',I.book],
    ['progress','ก้าวหน้า',I.chart],
    ['settings','ตั้งค่า',I.cog],
  ];
  return (
    <nav className="fixed bottom-0 inset-x-0 z-30 glass border-t border-neutral-200/60 dark:border-white/5 safe-bottom">
      <div className="flex max-w-lg mx-auto px-1 pt-1.5">
        {tabs.map(([id,label,icon])=>(
          <button key={id} onClick={()=>setTab(id)} className={`flex-1 flex flex-col items-center gap-1 py-1 min-h-[54px] justify-center transition ${tab===id?'text-blue-600':'text-neutral-400'}`}>
            <span className={`grid place-items-center w-14 h-7 rounded-full transition-all duration-200 ${tab===id?'bg-blue-100 dark:bg-blue-500/20':''}`}>
              <Icon d={icon} className="w-[22px] h-[22px]" stroke={tab===id?2.5:2}/>
            </span>
            <span className={`text-[10px] ${tab===id?'font-bold':'font-medium'}`}>{label}</span>
          </button>
        ))}
      </div>
    </nav>
  );
}

/* ============================================================
   14) ROOT APP
   ============================================================ */

function App() {
  const [state, dispatch] = useReducer(reducer, null, () => mergeState(loadState()));
  const [tab, setTab] = useState('dashboard');
  const [route, setRoute] = useState({ name:'tabs' });

  // persist
  useEffect(()=>{ saveState(state); }, [state]);
  // apply dark on mount
  useEffect(()=>{ document.documentElement.classList.toggle('dark', state.settings?.dark !== false); }, []);

  const go = (name, params={}) => {
    if (['dashboard','schedule','library','progress','settings'].includes(name)) { setTab(name); setRoute({name:'tabs'}); window.scrollTo(0,0); return; }
    if (name==='onboard') { setRoute({name:'onboard'}); return; }
    setRoute({ name, ...params }); window.scrollTo(0,0);
  };

  const finishOnboard = (profile) => {
    const program = buildProgram(profile);
    const schedule = buildSchedule(profile.days);
    dispatch({ type:'SET_PROFILE', payload: profile });
    dispatch({ type:'SET_PROGRAM', payload: program, schedule });
    setRoute({ name:'tabs' }); setTab('dashboard');
  };

  const ctx = { state, dispatch };

  // ยังไม่ onboard
  if (!state.profile || route.name==='onboard') {
    return <AppCtx.Provider value={ctx}><Onboarding onDone={finishOnboard}/></AppCtx.Provider>;
  }

  // full screen route: workout log
  if (route.name==='log') {
    return <AppCtx.Provider value={ctx}><WorkoutLog workoutIdx={route.workoutIdx} go={go}/></AppCtx.Provider>;
  }
  if (route.name==='editWorkout') {
    return <AppCtx.Provider value={ctx}><WorkoutEditor workoutIdx={route.workoutIdx} go={go}/></AppCtx.Provider>;
  }

  return (
    <AppCtx.Provider value={ctx}>
      <div className="min-h-screen safe-top">
        {tab==='dashboard' && <Dashboard go={go}/>}
        {tab==='schedule' && <SchedulePage go={go}/>}
        {tab==='library' && <Library/>}
        {tab==='progress' && <Progress go={go}/>}
        {tab==='settings' && <Settings go={go}/>}
      </div>
      <TabBar tab={tab} setTab={(t)=>{setTab(t); window.scrollTo(0,0);}}/>
    </AppCtx.Provider>
  );
}
